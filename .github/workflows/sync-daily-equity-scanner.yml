name: Sync DailyEquityScanner latest.html

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download latest.html from DailyEquityScanner
        env:
          GH_PAT: ${{ secrets.DAILYEQUITYSCANNER_PAT }}
        run: |
          curl --fail \
               -H "Authorization: token $GH_PAT" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/gitthubbard/DailyEquityScanner/contents/latest.html" \
               -o index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync index.html from DailyEquityScanner/latest.html"
            git push
          fi
