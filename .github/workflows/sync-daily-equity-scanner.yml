name: Sync source repos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 1-5'    # Daily at 5:00 PM EST — DailyEquityScanner
    - cron: '0 22 * * 5'    # Fridays at 5:00 PM EST — COT-Analysis

jobs:
  sync-equity-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Verify PAT and list repo contents
        env:
          GH_PAT: ${{ secrets.DAILYEQUITYSCANNER_PAT }}
        run: |
          echo "Listing root contents of DailyEquityScanner..."
          curl -s \
               -H "Authorization: token $GH_PAT" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/repos/gitthubbard/DailyEquityScanner/contents/" \
               | jq -r '.[] | .name' || echo "Failed to list contents (check PAT scope or repo name)"

      - name: Download latest.html from DailyEquityScanner
        env:
          GH_PAT: ${{ secrets.DAILYEQUITYSCANNER_PAT }}
        run: |
          HTTP_STATUS=$(curl --write-out "%{http_code}" --silent --output index.html \
               -H "Authorization: token $GH_PAT" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/gitthubbard/DailyEquityScanner/contents/memos/latest.html")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Error response body:"
            cat index.html
            exit 1
          fi

      - name: Sort Signal Matrix and inject COT regime
        run: python3 .github/scripts/inject_quality_metrics.py index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          [ -f COT_Analysis_Latest.html ] && git add COT_Analysis_Latest.html || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync index.html from DailyEquityScanner/latest.html"
            git push
          fi

  sync-cot-analysis:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * 5'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download latest HTML from COT-Analysis
        env:
          GH_PAT: ${{ secrets.DAILYEQUITYSCANNER_PAT }}
        run: |
          echo "Listing COT-Analysis/memo folder..."
          LATEST=$(curl -s \
               -H "Authorization: token $GH_PAT" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/repos/gitthubbard/COT-Analysis/contents/memo" \
               | jq -r '[.[] | select(.name | endswith(".html"))] | sort_by(.name) | last | .name')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "ERROR: No .html files found in COT-Analysis/memo"
            exit 1
          fi

          echo "Latest file: $LATEST"

          HTTP_STATUS=$(curl --write-out "%{http_code}" --silent --output COT_Analysis_Latest.html \
               -H "Authorization: token $GH_PAT" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/gitthubbard/COT-Analysis/contents/memo/$LATEST")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Error response body:"
            cat COT_Analysis_Latest.html
            exit 1
          fi

      - name: Inject COT content and navigation
        run: python3 .github/scripts/inject_quality_metrics.py index.html COT_Analysis_Latest.html --cot-only

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add COT_Analysis_Latest.html index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync COT_Analysis_Latest.html from COT-Analysis/memo"
            git push
          fi
